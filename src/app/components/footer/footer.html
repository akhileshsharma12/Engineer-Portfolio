<footer id="footer" class="bg-[#080d1a] px-6 md:px-16 pt-16 md:pt-20 pb-10" style="border-top: 1px solid rgba(255, 255, 255, 0.06)">
  <!-- Top — Get In Touch -->
  <div class="text-center mb-16">
    <!-- Subtitle -->
    <p class="text-slate-500 text-lg tracking-[12px] uppercase mb-6">Is it me you're looking for?</p>

    <!-- Main Heading -->
    <div class="glow-text-wrapper">
      <h2 class="font-semibold uppercase text-mist-300 mb-12 text-4xl sm:text-6xl" style="font-family: 'Barlow Condensed', sans-serif; line-height: 1">
        GET IN TOUCH
      </h2>
    </div>

    <!-- Email & Call -->
    <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-0 divide-y md:divide-y-0 md:divide-x divide-white/10 max-w-2xl mx-auto">
      <!-- Email -->
      <div class="flex-1 flex flex-col items-center gap-3 px-6 py-4 md:px-12 md:py-0">
        <span class="text-white font-black text-xl tracking-widest uppercase" style="font-family: 'Barlow Condensed', sans-serif">EMAIL</span>
        <a [href]="'mailto:' + email" class="text-slate-300 text-2xl pb-1 transition-colors hover:text-white" style="border-bottom: 1px solid rgba(255, 255, 255, 0.3)">{{ email }}</a>
      </div>

      <!-- Call -->
      <div class="flex-1 flex flex-col items-center gap-3 px-6 py-4 md:px-12 md:py-0">
        <span class="text-white font-black text-xl tracking-widest uppercase" style="font-family: 'Barlow Condensed', sans-serif">CALL</span>
        <a [href]="'tel:' + phone" class="text-slate-300 text-2xl pb-1 transition-colors hover:text-white" style="border-bottom: 1px solid rgba(255, 255, 255, 0.3)">{{ phone }}</a>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="border-t border-white/10 mb-8"></div>

  <!-- Bottom Bar -->
  <div class="flex flex-col md:flex-row items-center justify-between gap-6">
    <!-- Left — Credit -->
    <div>
      <p class="text-slate-600 text-xs tracking-widest uppercase mb-1">DESIGNED &amp; BUILT BY</p>
      <p class="text-white font-black text-sm tracking-widest uppercase" style="font-family: 'Barlow Condensed', sans-serif">AKHILESH SHARMA &copy; {{ year }}</p>
    </div>

    <!-- Right — Social Links -->
    <div class="flex flex-wrap justify-center items-center gap-4">
      @for (social of socials; track social.label) {
        <a [href]="social.url" target="_blank" class="text-slate-500 text-xs tracking-widest uppercase font-semibold hover:text-white transition-colors">{{ social.label }}</a>
      }
    </div>
  </div>
</footer>
