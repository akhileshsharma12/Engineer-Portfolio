<section class="px-16 py-6 bg-[#0a0f1e]">

  <div class="max-w-6xl mx-auto rounded-2xl px-12 py-12 flex items-center justify-between gap-10"
       style="
         background: linear-gradient(135deg, #0f1c2e 0%, #0a1628 50%, #071020 100%);
         border: 1px solid rgba(59,130,246,0.2);
         box-shadow: 0 0 60px rgba(59,130,246,0.05);
       ">

    <!-- Left -->
    <div class="flex-1">

      <!-- Heading -->
      <h2 class="font-black uppercase leading-tight mb-4 font-medium"
          style="font-family: 'Barlow Condensed', sans-serif; font-size: 3.5rem;">
        <span class="text-white">ELEVATE YOUR PROJECTS</span><br>
        <span class="text-white">WITH MY </span>
        <span style="
          background: linear-gradient(90deg, #1d4ed8 0%, #60a5fa 60%, #ffffff 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        ">EXPERTISE</span>
      </h2>

      <!-- Description -->
      <p class="text-slate-400 text-sm leading-relaxed max-w-lg mb-6">
        BCA Final Year Developer ready to bring your ideas to life
        with clean code, modern UI, and full stack solutions.
      </p>

      <!-- Badges -->
      <div class="flex gap-3 flex-wrap">
        @for (badge of badges; track badge.label) {
          <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm text-slate-300"
               style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);">
            <fa-icon [icon]="badge.icon" [class]="badge.iconColor + ' text-sm'"></fa-icon>
            {{ badge.label }}
          </div>
        }
      </div>

    </div>

    <!-- Right -->
    <div class="flex flex-col items-center gap-3 flex-shrink-0">

      <!-- Download Button -->
      <a href="assets/Akhilesh_Resume.pdf" download
         class="inline-flex items-center gap-3 px-8 py-4 rounded-full font-black uppercase tracking-wider text-white text-sm cursor-pointer transition-opacity hover:opacity-90"
         style="
           background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 60%, #60a5fa 100%);
           box-shadow: 0 0 30px rgba(59,130,246,0.4);
           font-family: 'Barlow Condensed', sans-serif;
           font-size: 1rem;
           letter-spacing: 2px;
         ">
        DOWNLOAD RESUME
        <fa-icon [icon]="faDownload" class="text-sm"></fa-icon>
      </a>

      <!-- Subtitle -->
      <p class="text-slate-500 text-xs tracking-wide">Available for full-time &amp; freelance</p>

    </div>

  </div>

</section>
